[workspace]
authors = ["Leonard Schulz <leonard.schulz@tuhh.de>"]
channels = ["conda-forge"]
name = "dagreon"
platforms = ["linux-64"]
version = "0.2.0"

[tasks]
format-check = { cmd = "ruff format --check dagreon tests docs", description = "Check code formatting." }
lint = { cmd = "ruff check dagreon tests docs", description = "Run Ruff linting." }
test = { cmd = "pytest", env = { PYTHONPATH = "." }, description = "Run the pytest suite." }
docs = { cmd = "sphinx-build -b html docs docs/_build/html", env = { PYTHONPATH = "." }, description = "Build the HTML documentation." }
docs-clean = { cmd = "rm -rf docs/_build/html", description = "Remove generated HTML documentation." }
docs-fresh = { cmd = "sphinx-build -E -b html docs docs/_build/html", env = { PYTHONPATH = "." }, description = "Rebuild the HTML documentation from scratch." }
build = { cmd = "python -m build --no-isolation", description = "Build source and wheel distributions." }
dist-check = { cmd = "twine check dist/*", depends-on = ["build"], description = "Build and check distributions." }
check = { depends-on = ["format-check", "lint", "test", "dist-check", "docs"], description = "Run the full local release check suite." }

[dependencies]
python = ">=3.12,<3.13"
python-lmdb = ">=1.5,<3"
rustworkx = ">=0.17,<0.18"
python-xxhash = ">=3.5,<4"
tqdm = ">=4.66,<5"
ray-default = ">=2.30,<3"
pytest = ">=8,<10"
ruff = ">=0.12,<1"
python-build = ">=1,<2"
hatchling = ">=1.26,<2"
twine = ">=5,<7"
sphinx = ">=8,<10"
